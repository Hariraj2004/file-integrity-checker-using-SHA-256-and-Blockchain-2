services:
  - type: web
    name: file-integrity-monitor
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn wsgi:app"
    disk:
      name: monitor-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
